<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wavee Reference Layout 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ececec;
        --panel: #f8f8f8;
        --line: #e2e2e2;
        --ink: #161616;
        --muted: #7b7b7b;
        --accent: #ffab00;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 100%, #f5ead6 0%, transparent 35%), var(--bg);
        font-family: 'Manrope', sans-serif;
        color: var(--ink);
      }
      .frame {
        width: min(1220px, 95vw);
        border: 1px solid var(--line);
        border-radius: 26px;
        background: var(--panel);
        padding: 16px;
        display: grid;
        grid-template-columns: 220px 1fr 74px;
        gap: 14px;
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.08);
      }
      .side,
      .rail {
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 12px;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #ededed;
        border-radius: 999px;
        padding: 8px 10px;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .mini-card {
        border: 1px solid #ececec;
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .mini-img {
        height: 96px;
        background: linear-gradient(145deg, #4a4a4a 0%, #1c1c1c 100%);
      }
      .mini-meta {
        padding: 8px;
        font-size: 12px;
      }
      .hero {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 10px;
        display: grid;
        gap: 12px;
      }
      .hero-main {
        min-height: 340px;
        border-radius: 34px;
        background:
          radial-gradient(circle at 70% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 36%),
          linear-gradient(130deg, #1d2638 0%, #0d1118 100%);
        color: #fff;
        padding: 24px;
        display: grid;
        align-content: end;
      }
      .hero-main h1 {
        margin: 0;
        font-size: clamp(28px, 3vw, 44px);
        line-height: 0.95;
      }
      .hero-main p {
        margin: 8px 0 0;
        color: rgba(255, 255, 255, 0.72);
        max-width: 42ch;
      }
      .hero-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 12px;
      }
      .form-card {
        border-radius: 24px;
        background: var(--accent);
        padding: 14px;
      }
      .form-card h2 {
        margin: 2px 0 10px;
        font-size: 18px;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        border: 1px solid rgba(0, 0, 0, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.45);
        padding: 6px 10px;
        font-size: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .row input,
      .row select {
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        padding: 9px;
        font: inherit;
      }
      .btn {
        margin-top: 10px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px;
        background: #111;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }
      .stats {
        border: 1px solid #ececec;
        border-radius: 20px;
        padding: 12px;
        display: grid;
        gap: 8px;
      }
      .stat {
        display: flex;
        justify-content: space-between;
        border-radius: 10px;
        background: #f8f8f8;
        padding: 8px 10px;
      }
      .rail {
        display: grid;
        justify-items: center;
        align-content: space-between;
      }
      .dot,
      .dot-accent {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        font-size: 12px;
      }
      .dot-accent {
        background: var(--accent);
        border-color: #e7a113;
        font-weight: 800;
      }
      @media (max-width: 980px) {
        .frame { grid-template-columns: 1fr; }
        .hero-grid,
        .row { grid-template-columns: 1fr; }
        .rail { grid-auto-flow: column; align-content: center; gap: 8px; }
      }
    </style>
  </head>
  <body>
    <section class="frame">
      <aside class="side">
        <div class="search">🔎 Search any item...</div>
        <div class="mini-card">
          <div class="mini-img"></div>
          <div class="mini-meta">Top picks / Homepod</div>
        </div>
        <div class="mini-card">
          <div class="mini-img"></div>
          <div class="mini-meta">Trending / Headphones</div>
        </div>
      </aside>

      <main class="hero">
        <div class="hero-main">
          <h1>ARISEN SOUND</h1>
          <p>Простой главный экран с акцентным визуалом и компактным конструктором формы.</p>
        </div>
        <div class="hero-grid">
          <div class="form-card">
            <h2>Explore categories</h2>
            <div class="chips">
              <span class="chip">Prime</span>
              <span class="chip">Babys</span>
              <span class="chip">Pharmacy</span>
              <span class="chip">Toys</span>
            </div>
            <div class="row">
              <input type="text" value="Order name" />
              <select><option>Priority</option></select>
            </div>
            <button class="btn" type="button">Order now</button>
          </div>
          <div class="stats">
            <div class="stat"><span>Favorites</span><strong>14k</strong></div>
            <div class="stat"><span>Views</span><strong>82k</strong></div>
            <div class="stat"><span>Shares</span><strong>4k</strong></div>
          </div>
        </div>
      </main>

      <nav class="rail">
        <div class="dot-accent">A</div>
        <div>
          <div class="dot">⌂</div>
          <div class="dot" style="margin-top:8px;">⌕</div>
          <div class="dot" style="margin-top:8px;">♡</div>
        </div>
        <div class="dot">☺</div>
      </nav>
    </section>
  </body>
</html>
