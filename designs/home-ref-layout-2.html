<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wavee Reference Layout 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #efefef;
        --panel: #fbfbfb;
        --line: #e4e4e4;
        --ink: #121212;
        --muted: #7d7d7d;
        --accent: #ffa900;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: 'Outfit', sans-serif;
        color: var(--ink);
      }
      .wrap {
        width: min(1220px, 95vw);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        display: grid;
        grid-template-columns: 190px 1fr 190px;
        gap: 12px;
        padding: 14px;
        box-shadow: 0 26px 52px rgba(0,0,0,.08);
      }
      .col {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #fff;
        padding: 12px;
      }
      .left .search {
        border: 1px solid #ededed;
        border-radius: 999px;
        padding: 9px 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .quick {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }
      .q {
        border-radius: 12px;
        border: 1px solid #ececec;
        padding: 10px;
        background: #fafafa;
        font-size: 13px;
      }
      .center {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: #fff;
        padding: 10px;
      }
      .hero {
        border-radius: 30px;
        min-height: 320px;
        background: linear-gradient(140deg, #1f2024 0%, #0e1015 100%);
        padding: 24px;
        color: #fff;
        display: grid;
        align-content: end;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(28px, 3vw, 42px);
        line-height: .95;
      }
      .hero p {
        margin: 8px 0 0;
        color: rgba(255,255,255,.73);
      }
      .builder {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 12px;
        background: #fffdfa;
      }
      .builder h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      .steps {
        display: grid;
        gap: 8px;
      }
      .step {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 8px;
        align-items: start;
      }
      .num {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #e8e8e8;
        background: #fff;
        display: grid;
        place-items: center;
        font-size: 12px;
      }
      .step-box {
        border: 1px solid #ececec;
        border-radius: 12px;
        padding: 8px;
      }
      .step-box label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .step-box input,
      .step-box select {
        width: 100%;
        border: 1px solid #ececec;
        border-radius: 8px;
        padding: 8px;
        font: inherit;
      }
      .cta {
        margin-top: 10px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px;
        background: var(--accent);
        font: inherit;
        font-weight: 700;
      }
      .right {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
      }
      .avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: var(--accent);
        border: 1px solid #e8a30f;
        display: grid;
        place-items: center;
        font-weight: 800;
      }
      .icons {
        border: 1px solid #ececec;
        border-radius: 999px;
        padding: 10px;
        display: grid;
        gap: 8px;
        align-content: start;
        justify-items: center;
      }
      .i {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid #ececec;
        display: grid;
        place-items: center;
      }
      @media (max-width: 980px) {
        .wrap { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <section class="wrap">
      <aside class="col left">
        <div class="search">Search any item...</div>
        <div class="quick">
          <div class="q">Top picks</div>
          <div class="q">Last orders</div>
          <div class="q">Saved lists</div>
        </div>
      </aside>

      <main class="center">
        <div class="hero">
          <h1>MODULAR HOME</h1>
          <p>Простой макет с фокусом на тёмный визуальный блок и структурированную форму.</p>
        </div>
        <div class="builder">
          <h2>Session builder</h2>
          <div class="steps">
            <div class="step">
              <div class="num">1</div>
              <div class="step-box">
                <label>Scenario</label>
                <select><option>Morning setup</option></select>
              </div>
            </div>
            <div class="step">
              <div class="num">2</div>
              <div class="step-box">
                <label>Item name</label>
                <input type="text" value="Arisen Pack" />
              </div>
            </div>
            <div class="step">
              <div class="num">3</div>
              <div class="step-box">
                <label>Delivery mode</label>
                <select><option>Standard</option></select>
              </div>
            </div>
          </div>
          <button class="cta" type="button">Proceed</button>
        </div>
      </main>

      <aside class="col right">
        <div class="avatar">a</div>
        <div class="icons">
          <div class="i">⌂</div>
          <div class="i">🔔</div>
          <div class="i">⌕</div>
          <div class="i">♡</div>
        </div>
        <div class="i">☺</div>
      </aside>
    </section>
  </body>
</html>
