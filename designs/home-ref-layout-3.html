<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wavee Reference Layout 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ededed;
        --line: #e2e2e2;
        --panel: #fafafa;
        --ink: #151515;
        --muted: #787878;
        --accent: #ffae00;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f1f1f1 0%, #e8e8e8 100%);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--ink);
      }
      .app {
        width: min(1240px, 95vw);
        border: 1px solid var(--line);
        border-radius: 26px;
        background: var(--panel);
        padding: 14px;
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 12px;
        box-shadow: 0 24px 56px rgba(0,0,0,.08);
      }
      .left {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #fff;
        padding: 10px;
      }
      .search {
        border: 1px solid #ededed;
        border-radius: 999px;
        padding: 9px 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .cards { margin-top: 10px; display: grid; gap: 8px; }
      .card {
        border-radius: 12px;
        border: 1px solid #ececec;
        padding: 10px;
        background: #f9f9f9;
        font-size: 13px;
      }
      .main {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #fff;
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr 66px;
        gap: 10px;
      }
      .content {
        display: grid;
        gap: 10px;
      }
      .hero {
        min-height: 320px;
        border-radius: 32px;
        background: radial-gradient(circle at 70% 40%, rgba(255,255,255,.08) 0%, transparent 35%), linear-gradient(145deg, #1a2030 0%, #111318 100%);
        color: #fff;
        padding: 22px;
        display: grid;
        align-content: end;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(26px,3vw,40px);
        line-height: .96;
      }
      .hero p { margin: 8px 0 0; color: rgba(255,255,255,.72); max-width: 44ch; }
      .bottom {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .form {
        border-radius: 24px;
        background: var(--accent);
        padding: 12px;
      }
      .form h2 { margin: 0 0 8px; font-size: 17px; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .field {
        border: 1px solid rgba(0,0,0,.14);
        border-radius: 10px;
        background: rgba(255,255,255,.88);
        padding: 8px;
      }
      .field label { display: block; font-size: 10px; text-transform: uppercase; color: #5e4e24; margin-bottom: 4px; }
      .field input,
      .field select {
        width: 100%;
        border: 0;
        background: transparent;
        font: inherit;
      }
      .toggle {
        margin-top: 8px;
        border: 1px solid rgba(0,0,0,.14);
        border-radius: 999px;
        padding: 4px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        background: rgba(255,255,255,.5);
      }
      .tg {
        border-radius: 999px;
        padding: 6px;
        text-align: center;
        font-size: 12px;
      }
      .tg.active { background: #111; color: #fff; }
      .go {
        margin-top: 8px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        font: inherit;
        font-weight: 700;
      }
      .meta {
        border: 1px solid #ececec;
        border-radius: 16px;
        background: #fafafa;
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .m { display: flex; justify-content: space-between; border-radius: 8px; background: #fff; padding: 8px; }
      .rail {
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 10px 8px;
        display: grid;
        justify-items: center;
        align-content: space-between;
        background: #fff;
      }
      .btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid #ececec;
        display: grid;
        place-items: center;
      }
      .btn.accent { background: var(--accent); border-color: #eda40e; }
      @media (max-width: 960px) {
        .app,
        .main,
        .bottom,
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <section class="app">
      <aside class="left">
        <div class="search">Search any item...</div>
        <div class="cards">
          <div class="card">Top picks</div>
          <div class="card">Last orders</div>
          <div class="card">Best offers</div>
        </div>
      </aside>

      <section class="main">
        <div class="content">
          <div class="hero">
            <h1>ARISEN STYLE HOME</h1>
            <p>Третий вариант: тот же общий стиль, но форма сделана как split-конфигуратор с переключателями.</p>
          </div>
          <div class="bottom">
            <form class="form">
              <h2>Quick setup</h2>
              <div class="grid">
                <div class="field"><label>Pack</label><input type="text" value="Starter" /></div>
                <div class="field"><label>Mode</label><select><option>Fast</option></select></div>
              </div>
              <div class="toggle">
                <div class="tg">Basic</div>
                <div class="tg active">Smart</div>
                <div class="tg">Pro</div>
              </div>
              <button class="go" type="button">Generate</button>
            </form>
            <div class="meta">
              <div class="m"><span>Likes</span><strong>14k</strong></div>
              <div class="m"><span>Orders</span><strong>2k</strong></div>
              <div class="m"><span>Saved</span><strong>4k</strong></div>
            </div>
          </div>
        </div>

        <aside class="rail">
          <div class="btn accent">a</div>
          <div>
            <div class="btn">⌂</div>
            <div class="btn" style="margin-top:8px;">⌕</div>
            <div class="btn" style="margin-top:8px;">♡</div>
          </div>
          <div class="btn">☺</div>
        </aside>
      </section>
    </section>
  </body>
</html>
