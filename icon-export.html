<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wavee Icon Export</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f16;
      --card: rgba(255, 255, 255, 0.03);
      --stroke: rgba(255, 255, 255, 0.12);
      --text: #e8ecf8;
      --muted: #9ca6c9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0%, #1c2538 0%, var(--bg) 46%, #05070a 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      padding: 40px;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      letter-spacing: 0.02em;
    }
    h2 {
      margin: 36px 0 14px;
      font-size: 16px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }
    .item {
      border: 1px solid var(--stroke);
      background: var(--card);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-height: 100px;
      justify-content: center;
    }
    .item svg { width: 34px; height: 34px; color: #f3f5fb; }
    .item.player svg { width: 38px; height: 38px; }
    .label {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
    }
    .nav-icons svg { width: 28px; height: 28px; }
    .arrow-btn {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .arrow-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <h1>Wavee Icons</h1>

  <h2>Top Nav</h2>
  <section class="grid nav-icons">
    <div class="item"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.75 10.4 12 4.75l7.25 5.65v8.1a.75.75 0 0 1-.75.75h-4.25v-5h-4.5v5H5.5a.75.75 0 0 1-.75-.75z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg><div class="label">home</div></div>
    <div class="item"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="5.75" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="m15 15 4.25 4.25" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><div class="label">search</div></div>
    <div class="item"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5.25A1.25 1.25 0 0 1 7.25 4h9.5A1.25 1.25 0 0 1 18 5.25v13.5A1.25 1.25 0 0 1 16.75 20h-9.5A1.25 1.25 0 0 1 6 18.75z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9 8h6M9 12h6M9 16h4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><div class="label">library</div></div>
    <div class="item"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19.25 5.6 12.9a4.15 4.15 0 0 1 5.87-5.87L12 7.56l.53-.53a4.15 4.15 0 0 1 5.87 5.87z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg><div class="label">likes</div></div>
  </section>

  <h2>Mini Player</h2>
  <section class="grid">
    <div class="item player"><svg viewBox="0 0 100 100"><path fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" d="M 50,40 C 45,15 15,10 12,35 C 8,65 30,85 50,92 C 70,85 92,65 88,35 C 85,10 55,15 50,40 Z"/></svg><div class="label">heart</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><g fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"><path d="M 15,75 Q 45,85 80,25"/><path d="M 65,22 L 85,20 L 88,40"/><path d="M 15,25 Q 40,20 60,45 T 80,75"/><path d="M 62,75 L 82,80 L 85,60"/></g></svg><div class="label">shuffle</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><path d="M 15,20 Q 12,50 18,80 L 28,78 Q 22,50 25,18 Z" fill="currentColor"/><path d="M 85,20 C 90,20 88,50 82,80 C 80,88 75,85 65,80 C 55,75 32,62 25,55 C 18,48 22,42 32,38 C 42,32 75,18 80,18 Z" fill="currentColor"/></svg><div class="label">previous</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><path d="M 28,18 C 22,18 25,48 29,82 C 30,90 35,88 45,82 C 55,76 82,60 88,54 C 95,47 90,42 82,38 C 72,32 40,16 34,18 Z" fill="currentColor"/></svg><div class="label">play</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><path d="M 15,20 C 10,20 12,50 18,80 C 20,88 25,85 35,80 C 45,75 68,62 75,55 C 82,48 78,42 68,38 C 58,32 25,18 20,18 Z" fill="currentColor"/><path d="M 75,20 Q 72,50 78,80 L 88,78 Q 82,50 85,18 Z" fill="currentColor"/></svg><div class="label">next</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><g fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"><path d="M 25,50 C 25,25 45,15 65,25 C 85,35 85,65 65,80 C 45,95 20,85 20,65"/><path d="M 10,75 L 18,55 L 35,68"/></g></svg><div class="label">repeat</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><path d="M 45,40 C 40,10 8,10 8,40 C 8,65 25,80 40,90 L 52,70 L 40,55 L 50,40 Z" fill="currentColor"/><path d="M 55,42 L 45,58 L 58,72 L 48,90 C 60,82 92,68 92,42 C 92,12 60,12 55,42 Z" fill="currentColor"/></svg><div class="label">heart broken</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><g fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><path d="M 18,28 Q 46,23 78,30"/><path d="M 14,50 Q 47,55 82,48"/><path d="M 24,72 Q 42,68 56,72"/><path d="M 58,63 L 80,72 L 58,81 Z" fill="currentColor" stroke="none"/></g></svg><div class="label">queue</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><g fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><path d="M 20,26 Q 24,18 36,18 H 72 Q 82,18 82,28 V 60 Q 82,70 72,70 H 46 L 28,82 L 31,70 H 28 Q 18,70 18,60 V 32 Q 18,28 20,26 Z"/><path d="M 34,34 Q 49,30 68,34"/><path d="M 34,48 Q 51,52 68,47"/><path d="M 34,61 Q 46,58 58,61"/></g></svg><div class="label">lyrics</div></div>
    <div class="item player"><svg viewBox="0 0 100 100"><g fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M 18,40 Q 21,50 18,60 L 33,58 L 50,82 Q 54,82 54,50 Q 54,18 50,18 L 33,42 Z" fill="currentColor" stroke="none"/><path d="M 68,34 Q 79,50 68,66"/><path d="M 83,22 Q 98,50 83,78"/></g></svg><div class="label">volume</div></div>
  </section>

  <h2>Carousel Arrows</h2>
  <section class="grid" style="grid-template-columns: repeat(2, minmax(120px, 180px)); max-width: 420px;">
    <div class="item"><div class="arrow-btn"><svg viewBox="0 0 24 24"><path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="label">arrow left</div></div>
    <div class="item"><div class="arrow-btn"><svg viewBox="0 0 24 24"><path d="M9.5 6.5 15 12l-5.5 5.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="label">arrow right</div></div>
  </section>
</body>
</html>
